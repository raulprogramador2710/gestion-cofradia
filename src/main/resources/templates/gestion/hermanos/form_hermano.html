<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{gestion/base :: head('Formulario Hermano')}"></head>
<body>
<div th:replace="~{gestion/base :: navbar}"></div>

<main class="main-content container py-4">
  <form th:action="@{/gestion/hermanos/guardar}" th:object="${hermano}" method="post">
    <input type="hidden" th:field="*{id}" />
    <input type="hidden" th:field="*{numHermano}" />

    <!-- HEADER -->
    <div class="card shadow-sm mb-4 border-0 rounded-4">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h1 class="fw-bold mb-0" th:if="${!esNuevo}">Editar Hermano</h1>
          <h1 class="fw-bold mb-0" th:if="${esNuevo}">Nuevo Hermano</h1>
        </div>
        <div>
          <a th:href="@{/gestion/hermanos}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
          <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
        </div>
      </div>
    </div>

    <!-- 1. DATOS PERSONALES -->
    <div class="card shadow-sm border-0 rounded-4 mb-4">
      <div class="card-header bg-white py-3 border-bottom-0">
        <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-person-vcard me-2"></i>Datos Personales</h5>
      </div>
      <div class="card-body pt-0">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Nombre</label>
            <input type="text" class="form-control shadow-none" th:field="*{nombre}" required/>
          </div>
          <div class="col-md-5">
            <label class="form-label text-muted small fw-bold">Apellidos</label>
            <input type="text" class="form-control shadow-none" th:field="*{apellidos}" required/>
          </div>
          <div class="col-md-3">
            <label class="form-label text-muted small fw-bold">DNI / NIE</label>
            <input type="text" class="form-control shadow-none" th:field="*{dni}" required/>
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Fecha de Nacimiento</label>
            <input type="date" class="form-control shadow-none" name="fechaNacimiento"
                   th:value="${hermano.fechaNacimiento != null ? #temporals.format(hermano.fechaNacimiento, 'yyyy-MM-dd') : ''}" required/>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. DATOS DE CONTACTO Y LOCALIZACIÓN -->
    <div class="card shadow-sm border-0 rounded-4 mb-4">
      <div class="card-header bg-white py-3 border-bottom-0">
        <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-geo-alt me-2"></i>Contacto y Localización</h5>
      </div>
      <div class="card-body pt-0">
        <div class="row g-3">
          <div class="col-md-7">
            <label class="form-label text-muted small fw-bold">Dirección</label>
            <input type="text" class="form-control shadow-none" th:field="*{direccion}" placeholder="Calle, número, piso..."/>
          </div>
          <div class="col-md-5">
            <label class="form-label text-muted small fw-bold">Localidad</label>
            <input type="text" class="form-control shadow-none" th:field="*{localidad}" />
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Teléfono Móvil</label>
            <input type="text" class="form-control shadow-none" th:field="*{telefono}" />
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Correo Electrónico</label>
            <input type="email" class="form-control shadow-none" th:field="*{email}" />
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Preferencia de Comunicación</label>
            <select class="form-select shadow-none" th:field="*{formaComunicacion.id}">
              <option th:each="fc : ${formasComunicacion}" th:value="${fc.id}" th:text="${fc.codigoVisual}"></option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. DATOS DE PAGO -->
    <div class="card shadow-sm border-0 rounded-4 mb-4">
      <div class="card-header bg-white py-3 border-bottom-0">
        <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-credit-card me-2"></i>Información de Pago</h5>
      </div>
      <div class="card-body pt-0">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Método de Pago</label>
            <select class="form-select shadow-none" th:field="*{formaPago.id}">
              <option th:each="fp : ${formasPago}" th:value="${fp.id}" th:text="${fp.codigoVisual}"></option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Año de ultimo pago</label>
            <input type="number" class="form-control shadow-none" name="fechaUltimoPago"
                   th:value="${hermano.fechaUltimoPago != null ? hermano.fechaUltimoPago : ''}" />  
          </div>
          <div class="col-md-8">
            <label class="form-label text-muted small fw-bold">Cuenta Bancaria (IBAN)</label>
            <input type="text" class="form-control shadow-none" th:field="*{iban}" placeholder="ES00 0000..."/>
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Estado de Cuotas</label>
            <select class="form-select shadow-none" th:field="*{situacionPago.id}">
              <option th:each="sp : ${situacionesPago}" th:value="${sp.id}" th:text="${sp.codigoVisual}"></option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- 4. TEMAS DE COFRADÍA -->
    <div class="card shadow-sm border-0 rounded-4 mb-4">
      <div class="card-header bg-white py-3 border-bottom-0">
        <h5 class="mb-0 fw-bold text-primary"><i class="bi bi-church me-2"></i>Vida de Cofradía</h5>
      </div>
      <div class="card-body pt-0">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Situación del Hermano</label>
            <select class="form-select shadow-none" th:field="*{situacion.id}">
              <option th:each="s : ${situaciones}" th:value="${s.id}" th:text="${s.codigoVisual}"></option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Puesto en Salida</label>
            <select class="form-select shadow-none" th:field="*{tipoParticipacion.id}">
              <option value="">-- Sin asignar --</option>
              <option th:each="tp : ${tiposParticipacion}" th:value="${tp.id}" th:text="${tp.nombre}"></option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label text-muted small fw-bold">Año de Alta</label>
            <input type="number" class="form-control shadow-none" name="fechaInicioCofradia"
                   th:value="${hermano.fechaInicioCofradia != null ? hermano.fechaInicioCofradia : ''}" />  
          </div>
        </div>
      </div>
    </div>
  
  </form>
</main>

<div th:replace="~{gestion/base :: footer}"></div>
<div th:replace="~{gestion/base :: scripts}"></div>
</body>
</html>
