<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Formulario Hermano')}"></head>
<body>
<div th:replace="~{base :: navbar}"></div>

<main class="container py-4">
  <div class="card shadow">
    <div class="card-header">
      <h5 th:text="${esNuevo} ? 'Nuevo Hermano' : 'Editar Hermano'">Formulario Hermano</h5>
    </div>
    <div class="card-body">
      <form th:action="@{/gestion/hermanos/guardar}" th:object="${hermano}" method="post">
        <div class="row mb-3">
          <div class="col-md-2">
            <label class="form-label">Nº Hermano</label>
            <!-- campo visual solo lectura -->
            <input type="number" class="form-control" th:value="${hermano.numHermano}" readonly />
            <!-- hidden para binding y que el valor llegue al controller -->
            <input type="hidden" th:field="*{numHermano}" />
          </div>

          <div class="col-md-5">
            <label class="form-label">Apellidos</label>
            <input type="text" class="form-control" th:field="*{apellidos}" />
          </div>

          <div class="col-md-5">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{nombre}" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-3">
            <label class="form-label">DNI</label>
            <input type="text" class="form-control" th:field="*{dni}" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha Nacimiento</label>
            <!-- input date -> Spring bind a LocalDate automáticamente -->
            <input type="date" class="form-control" th:value="${hermano.fechaNacimiento != null} ? ${#temporals.format(hermano.fechaNacimiento, 'yyyy-MM-dd')} : ''">
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha inicio cofradía</label>
            <input type="text" class="form-control" th:field="*{fechaInicioCofradia}" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha último pago</label>
            <input type="text" class="form-control" th:field="*{fechaUltimoPago}" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Estado</label>
            <select class="form-select" th:field="*{estado.id}">
              <option th:each="e : ${estados}"
                      th:value="${e.id}"
                      th:text="${e.codigoVisual}">Estado</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Forma de Pago</label>
            <select class="form-select" th:field="*{formaPago.id}">
              <option th:each="p : ${formasPago}"
                      th:value="${p.id}"
                      th:text="${p.codigoVisual}">Pago</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Forma de Comunicación</label>
            <select class="form-select" th:field="*{formaComunicacion.id}">
              <option th:each="c : ${formasComunicacion}"
                      th:value="${c.id}"
                      th:text="${c.codigoVisual}">Comunic.</option>
            </select>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" th:field="*{direccion}" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Localidad</label>
            <input type="text" class="form-control" th:field="*{localidad}" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" th:field="*{telefono}" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" />
          </div>
          <div class="col-md-6">
            <label class="form-label">IBAN</label>
            <input type="text" class="form-control" th:field="*{iban}" />
          </div>
        </div>

        <!-- id oculto para editar -->
        <input type="hidden" th:field="*{id}" />

        <div class="d-flex justify-content-end">
          <a th:href="@{/gestion/hermanos}" class="btn btn-secondary me-2">Cancelar</a>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</main>

<div th:replace="~{base :: footer}"></div>
</body>
</html>
