<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{gestion/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Censo de Hermanos - [[${session.nombreCofradia}]]</title>
</head>
<body>
<section>
    <div class="card shadow">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-bold"><i class="fa-solid fa-users"></i> CENSO DE HERMANOS</span>
            <a th:href="@{/gestion/hermanos/nuevo}" class="btn-logout btn-sm text-decoration-none">
                <i class="fa-solid fa-user-plus"></i> NUEVO HERMANO
            </a>
        </div>

        <div class="card-body p-3">
            <form th:action="@{/gestion/hermanos}" method="get" class="row g-3 align-items-center mb-3">
                <div class="col-auto">
                    <input type="text" name="filtroNombre" th:value="${filtroNombre}" placeholder="Buscar por Apellidos o Nombre" class="form-control form-control-sm"/>
                </div>
                <div class="col-auto">
                    <input type="text" name="filtroDni" th:value="${filtroDni}" placeholder="Buscar por DNI" class="form-control form-control-sm"/>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">
                                <a th:href="@{/gestion/hermanos(page=0, size=${size}, sortField='numHermano', sortDir=${sortField == 'numHermano' ? reverseSortDir : 'asc'}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">
                                    Nº <i th:classappend="${sortField == 'numHermano' ? (sortDir == 'asc' ? 'fa fa-arrow-up' : 'fa fa-arrow-down') : ''}"></i>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/gestion/hermanos(page=0, size=${size}, sortField='apellidos', sortDir=${sortField == 'apellidos' ? reverseSortDir : 'asc'}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">
                                    Apellidos, Nombre <i th:classappend="${sortField == 'apellidos' ? (sortDir == 'asc' ? 'fa fa-arrow-up' : 'fa fa-arrow-down') : ''}"></i>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/gestion/hermanos(page=0, size=${size}, sortField='dni', sortDir=${sortField == 'dni' ? reverseSortDir : 'asc'}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">
                                    DNI <i th:classappend="${sortField == 'dni' ? (sortDir == 'asc' ? 'fa fa-arrow-up' : 'fa fa-arrow-down') : ''}"></i>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/gestion/hermanos(page=0, size=${size}, sortField='situacionCodigo', sortDir=${sortField == 'situacionCodigo' ? reverseSortDir : 'asc'}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">
                                    Situación <i th:classappend="${sortField == 'situacionCodigo' ? (sortDir == 'asc' ? 'fa fa-arrow-up' : 'fa fa-arrow-down') : ''}"></i>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/gestion/hermanos(page=0, size=${size}, sortField='pagoCodigo', sortDir=${sortField == 'pagoCodigo' ? reverseSortDir : 'asc'}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">
                                    Pago <i th:classappend="${sortField == 'pagoCodigo' ? (sortDir == 'asc' ? 'fa fa-arrow-up' : 'fa fa-arrow-down') : ''}"></i>
                                </a>
                            </th>
                            <th class="text-center">Labor salida</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="h : ${hermanos}">
                            <td class="ps-4 fw-bold" th:text="${h.numHermano}">1</td>
                            <td th:text="${h.apellidos + ', ' + h.nombre}">García, José</td>
                            <td th:text="${h.dni}">12345678Z</td>

                            <td>
                                <span class="badge rounded-pill"
                                      th:text="${h.situacionVisual ?: '-'}"
                                      th:classappend="${
                                        h.situacionCodigo == 'ACTIVO'  ? ' bg-success' :
                                        (h.situacionCodigo == 'BAJA'   ? ' bg-danger'  :
                                        (h.situacionCodigo == 'FALLE'  ? ' bg-fallecido' : ' bg-secondary'))}">
                                </span>
                            </td>

                            <td>
                                <span th:if="${!hayCuota}" class="text-muted small">Sin cuota</span>
                                <span th:if="${hayCuota}"
                                      class="badge rounded-pill"
                                      th:text="${h.pagoVisual ?: '-'}"
                                      th:classappend="${
                                        h.pagoCodigo == 'AL_DIA'    ? ' bg-success' :
                                        (h.pagoCodigo == 'NO_PAGADO' ? ' bg-warning text-dark' :
                                        (h.pagoCodigo == 'EXENTO'   ? ' bg-info text-dark' : ' bg-secondary'))}">
                                </span>
                            </td>

                            <td class="text-center">
                                <span th:if="${h.tipoParticipacionNombre != null}"
                                      th:text="${h.tipoParticipacionNombre}"
                                      class="badge bg-info text-dark">
                                </span>
                                <span th:if="${h.tipoParticipacionNombre == null}" class="text-muted small">-</span>
                            </td>

                            <td class="text-center">
                                <a th:href="@{/gestion/hermanos/detalle/{id}(id=${h.id})}" class="btn btn-outline-secondary btn-sm me-1"><i class="fa-solid fa-eye"></i></a>
                                <a th:href="@{/gestion/hermanos/editar/{id}(id=${h.id})}" class="btn btn-outline-primary btn-sm me-1"><i class="fa-solid fa-pen-to-square"></i></a>
                                <div sec:authorize="hasRole('ADMIN')" style="display:inline">
                                    <form th:action="@{/gestion/hermanos/{id}/eliminar(id=${h.id})}" method="post" style="display:inline">
                                        <input type="hidden" name="_method" value="delete"/>
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="button"
                                                class="btn btn-outline-danger btn-sm btn-confirm-delete"
                                                data-confirm-title="Eliminar hermano"
                                                data-confirm-message="¿Eliminar este hermano? Esta acción no se puede deshacer."
                                                data-confirm-accept="Sí, eliminar">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${hermanosPage.totalPages > 0}">
                <ul class="pagination justify-content-center mt-3">
                    <li class="page-item" th:classappend="${hermanosPage.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/gestion/hermanos(page=${page - 1}, size=${size}, sortField=${sortField}, sortDir=${sortDir}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">&laquo;</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, hermanosPage.totalPages - 1)}" th:classappend="${i == page} ? 'active'">
                        <a class="page-link" th:href="@{/gestion/hermanos(page=${i}, size=${size}, sortField=${sortField}, sortDir=${sortDir}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${hermanosPage.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/gestion/hermanos(page=${page + 1}, size=${size}, sortField=${sortField}, sortDir=${sortDir}, filtroNombre=${filtroNombre}, filtroDni=${filtroDni})}">&raquo;</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <style>
        .bg-fallecido { background-color: #795548 !important; }
    </style>
</section>
</body>
</html>
