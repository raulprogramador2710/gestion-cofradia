<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{gestion/base :: head('Panel - Inicio')}"></head>
<body>
    <div th:replace="~{gestion/base :: navbar}"></div>

    <div class="main-content">
        <!-- Cabecera -->
        <h1 class="page-title">Panel de Control</h1>
        <p class="page-subtitle" th:if="${cofradia != null}">
            <i class="bi bi-house-door"></i> Gestión activa: <strong th:text="${cofradia.nombre}">Cofradía</strong>
        </p>

        <!-- Grid de Tarjetas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Hermanos</div>
                <div class="stat-value" th:text="${totalHermanos}">0</div>
            </div>
            <div class="stat-card color2">
                <div class="stat-label">Notificaciones</div>
                <div class="stat-value" th:text="${totalNotificaciones}">0</div>
            </div>
            <div class="stat-card color3">
                <div class="stat-label">Tareas Pendientes</div>
                <div class="stat-value" th:text="${#lists.size(tareasProximas)}">0</div>
            </div>
        </div>

        <!-- Sección de Gráficos -->
        <div class="charts-section">
            <div class="charts-header">
                <h5>Distribución de la Cofradía</h5>
            </div>
            
            <div class="charts-grid">
                <div class="chart-item">
                    <h6>Estado de Hermanos</h6>
                    <div class="canvas-wrapper">
                        <canvas id="chartEstado"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <h6>Formas de Pago</h6>
                    <div class="canvas-wrapper">
                        <canvas id="chartPago"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <h6>Vías de Comunicación</h6>
                    <div class="canvas-wrapper">
                        <canvas id="chartComunicacion"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{gestion/base :: footer}"></div>
    <div th:replace="~{gestion/base :: scripts}"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:inline="javascript">
    // Función para limpiar etiquetas raras de Java
    function cleanLabels(dataMap) {
        const clean = {};
        if (!dataMap) return clean;
        Object.keys(dataMap).forEach(key => {
            let newKey = key;
            // Si la clave parece un objeto de Java (tiene @), le ponemos un nombre genérico
            if (key.includes('@')) newKey = "Dato " + Math.floor(Math.random()*100);
            clean[newKey] = dataMap[key];
        });
        return clean;
    }

    // 1. Recogemos los datos de Thymeleaf
    const rawEstado = /*[[${hermanosPorEstado}]]*/ {};
    const rawPago = /*[[${hermanosPorFormaPago}]]*/ {};
    const rawComunicacion = /*[[${hermanosPorFormaComunicacion}]]*/ {};

    // 2. Limpiamos los datos para que las etiquetas salgan bien
    const dataEstado = cleanLabels(rawEstado);
    const dataPago = cleanLabels(rawPago);
    const dataComunicacion = cleanLabels(rawComunicacion);

    // Colores corporativos
    const color1 = getComputedStyle(document.documentElement).getPropertyValue('--cp1').trim() || '#2c3e50';
    const color2 = getComputedStyle(document.documentElement).getPropertyValue('--cp2').trim() || '#e74c3c';
    const palette = [color1, color2, '#00b894', '#fdcb6e', '#6c5ce7', '#fab1a0', '#0984e3'];

    function createChart(id, dataMap) {
        const canvas = document.getElementById(id);
        if (!canvas) return;
        
        const ctx = canvas.getContext('2d');
        new Chart(ctx, {
            type: 'pie', // <--- AQUÍ: TARTA (PIE)
            data: {
                labels: Object.keys(dataMap),
                datasets: [{
                    data: Object.values(dataMap),
                    backgroundColor: palette,
                    borderWidth: 2,
                    borderColor: '#ffffff',
                    hoverOffset: 15
                }]
            },
            options: {
                maintainAspectRatio: false,
                // cutout: '70%', // <--- ELIMINADO: Las tartas no llevan cutout
                plugins: {
                    legend: { 
                        position: 'bottom', 
                        labels: { 
                            padding: 15, 
                            usePointStyle: true, 
                            font: { size: 11 } 
                        } 
                    }
                }
            }
        });
    }

    // Dibujamos al cargar la página
    window.onload = () => {
        createChart('chartEstado', dataEstado);
        createChart('chartPago', dataPago);
        createChart('chartComunicacion', dataComunicacion);
    };
</script>
</body>
</html>
