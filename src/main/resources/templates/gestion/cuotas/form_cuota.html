<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{gestion/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Nueva Cuota - [[${cofradia.nombreCorto}]]</title>
</head>
<body>
<section>
    <div class="mb-4">
        <h1><i class="fas fa-plus-circle me-2"></i>Nueva Cuota</h1>
        <p class="text-muted">Configura el concepto de cobro para la cofradía.</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/gestion/cuotas/guardar}" th:object="${cuota}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre de la Cuota</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Cuota Anual 2025" required>
                    </div>
                    <div class="col-md-3">
                        <label for="anio" class="form-label">Año</label>
                        <input type="number" th:field="*{anio}" class="form-control" th:value="${#dates.year(#dates.createNow())}" required>
                    </div>
                    <div class="col-md-3">
                        <label for="tipo" class="form-label">Tipo de Cuota</label>
                        <select th:field="*{tipo.id}" class="form-select" required>
                            <option th:each="t : ${tiposCuota}" th:value="${t.id}" th:text="${t.codigoVisual}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="importeBase" class="form-label">Importe Base (€)</label>
                        <div class="input-group">
                            <span class="input-group-text">€</span>
                            <input type="number" step="0.01" th:field="*{importeBase}" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" th:field="*{activa}" id="activa">
                            <label class="form-check-label" for="activa">Cuota Activa</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                    <a th:href="@{/gestion/cuotas}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i> Guardar Cuota
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</body>
</html>
