<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{gestion/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Recibos de [[${cuota.nombre}]]</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1><i class="fas fa-receipt me-2"></i>Recibos: [[${cuota.nombre}]]</h1>
            <p class="text-muted mb-0">Importe: [[${#numbers.formatCurrency(cuota.importeBase)}]] | Año: [[${cuota.anio}]]</p>
        </div>
        <div class="d-flex gap-2">
            <form th:action="@{/gestion/cuotas/{id}/generar-recibos(id=${cuota.id})}" method="post">
                <button type="submit" class="btn btn-warning">
                    <i class="fas fa-magic me-1"></i> Generar Recibos Masivos
                </button>
            </form>
            <a th:href="@{/gestion/cuotas}" class="btn btn-outline-secondary">Volver</a>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-success text-white shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title">Pagados</h5>
                    <h2 class="mb-0" th:text="${totalPagados}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-danger text-white shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title">Pendientes</h5>
                    <h2 class="mb-0" th:text="${totalDeudores}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Nº Hermano</th>
                        <th>Nombre Completo</th>
                        <th>Importe</th>
                        <th>Estado</th>
                        <th>Fecha Pago</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${recibos}">
                        <td th:text="${r.hermano.numHermano}">123</td>
                        <td th:text="${r.hermano.getNombreCompleto()}">Nombre Apellidos</td>
                        <td th:text="${#numbers.formatCurrency(r.importeFinal)}">30,00 €</td>
                        <td>
                            <span th:if="${r.situacionPago.codigo == 'AL_DIA'}" class="badge bg-success">PAGADO</span>
                            <span th:if="${r.situacionPago.codigo == 'DEUDOR'}" class="badge bg-danger">PENDIENTE</span>
                        </td>
                        <td th:text="${r.fechaPago != null ? #temporals.format(r.fechaPago, 'dd/MM/yyyy') : '-'}">-</td>
                        <td class="text-end">
                            <form th:if="${r.situacionPago.codigo == 'DEUDOR'}" 
                                  th:action="@{/gestion/cuotas/recibos/{id}/pagar(id=${r.id})}" method="post" class="d-inline">
                                <input type="hidden" name="cuotaId" th:value="${cuota.id}" />
                                <button type="submit" class="btn btn-sm btn-success">
                                    <i class="fas fa-check me-1"></i> Marcar Pagado
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
