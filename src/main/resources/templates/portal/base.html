<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:utext="${pageTitle} ?: 'Portal Hermano'">Portal Hermano</title>

    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <style>
        :root {
            --color-principal-1: #2c3e50;
            --color-principal-2: #e74c3c;
            --color-secundario: #ffffff;
        }
    </style>

    <style th:if="${session.usarColoresPersonalizados}">
	    :root {
	        /*[+
	        --color-principal-1: [[${session.color1}]];
	        --color-principal-2: [[${session.color2}]];
	        --color-secundario: [[${session.color3} != null ? session.color3 : '#ffffff'}]];
	        +]*/
	        
	        /* Valores de respaldo para que el editor vea CSS válido */
	        --color-principal-1: #2c3e50;
	        --color-principal-2: #e74c3c;
	        --color-secundario: #ffffff;
	    }
	</style>

    <style>
        .portal-header { background: var(--color-principal-1); color: white; padding: 0.6rem 1rem; }
        .btn-primary { background: var(--color-principal-2); color: white; padding: 0.4rem 0.8rem; border-radius:4px; border:none; }
    </style>
</head>
<body>
    <header class="portal-header">
        <a th:href="@{/portal/inicio}" class="brand" style="color:white; text-decoration:none;">Portal Hermano</a>
        <span th:if="${session.nombreCofradia}" style="margin-left:1rem">| <strong th:text="${session.nombreCofradia}">Cofradía</strong></span>

        <form th:action="@{/logout}" method="post" style="display:inline; float:right;">
            <button type="submit" class="btn-primary">Cerrar sesión</button>
        </form>
    </header>

    <main style="padding:1rem;">
        <div th:fragment="content">
            <h2>Bienvenido</h2>
            <p>Contenido del portal.</p>
        </div>
    </main>

    <footer style="padding:1rem; text-align:center;">
        <small>&copy; <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span> Portal</small>
    </footer>
</body>
</html>
