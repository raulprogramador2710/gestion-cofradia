<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{portal/base :: content}">
<!-- Usamos el layout base que creamos antes -->
<head>
    <title>Inicio - Mi Portal</title>
</head>
<body>
    <div th:fragment="content">
        <div class="container py-4">
            <div class="row">
                <div class="col-12">
                    <h1 class="mb-4">Hola, <span th:text="${#authentication.name}">Usuario</span></h1>
                    <p class="lead">Bienvenido al portal oficial de <strong th:text="${session.nombreCofradia}">Tu Cofradía</strong>.</p>
                </div>
            </div>

            <div class="row mt-4">
                <!-- Tarjeta de Datos Personales -->
                <div class="col-md-6 mb-4">
                    <div class="card h-100 shadow-sm" style="border-top: 4px solid var(--color-principal-1)">
                        <div class="card-body">
                            <h5 class="card-title">Mis Datos</h5>
                            <p class="card-text text-muted">Consulta y actualiza tu información personal y de contacto.</p>
                            <a href="#" class="btn" style="background-color: var(--color-principal-1); color: white;">Ver Perfil</a>
                        </div>
                    </div>
                </div>

                <!-- Tarjeta de Cuotas/Pagos -->
                <div class="col-md-6 mb-4">
                    <div class="card h-100 shadow-sm" style="border-top: 4px solid var(--color-principal-2)">
                        <div class="card-body">
                            <h5 class="card-title">Mis Cuotas</h5>
                            <p class="card-text text-muted">Revisa el estado de tus pagos y descarga tus recibos.</p>
                            <a href="#" class="btn" style="background-color: var(--color-principal-2); color: white;">Ver Pagos</a>
                        </div>
                    </div>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
			    <button type="submit" style="background:none; border:none; color:blue; text-decoration:underline; cursor:pointer;">
			        Cerrar Sesión
			    </button>
			</form>
        </div>
    </div>
</body>
</html>
