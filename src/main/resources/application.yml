spring:
  application:
    name: gestion-cofradia
  datasource:
    url: jdbc:postgresql://localhost:5432/gestion_cofradia
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        envers:
          audit_table_suffix: _aud  # Esto es por defecto, pero mejor asegurar
          revision_field_name: rev_id